server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /up {
    add_header Content-Type text/plain;
    try_files /up =200;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(css|js|jpg|jpeg|png|svg|webp|mp4|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }
}

