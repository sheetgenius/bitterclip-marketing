server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Kamal routes both TLS hosts to this container. Keep campaign paths and
  # query parameters intact while collapsing www onto the canonical apex.
  if ($host = www.bitterclip.com) {
    return 301 https://bitterclip.com$request_uri;
  }

  location = /up {
    add_header Content-Type text/plain;
    try_files /up =200;
  }

  # Retired pages (the old bespoke /docs explainer and /mcp page). The docs site
  # replaced them: /docs is now the content hub, and the assistant guide lives at
  # /docs/assistants/overview. 301 the old URLs (and their .md twins) to their homes.
  location = /mcp {
    return 301 /docs/assistants/overview;
  }

  location = /mcp.md {
    return 301 /docs/assistants/overview.md;
  }

  # /docs.md is now the generated docs-hub twin (from content/index.md); the old
  # explainer content moved to /docs/getting-started/what-is-bitterclip. The .md
  # glob below serves it, so no special-case block is needed here.

  location = /index.md {
    types { text/markdown md; }
    default_type text/markdown;
    add_header Cache-Control "public, max-age=3600";
    add_header Link "<https://bitterclip.com/>; rel=\"canonical\"";
    try_files /index.md =404;
  }

  location = /privacy.md {
    types { text/markdown md; }
    default_type text/markdown;
    add_header Cache-Control "public, max-age=3600";
    add_header Link "<https://bitterclip.com/privacy>; rel=\"canonical\"";
    try_files /privacy.md =404;
  }

  location = /terms.md {
    types { text/markdown md; }
    default_type text/markdown;
    add_header Cache-Control "public, max-age=3600";
    add_header Link "<https://bitterclip.com/terms>; rel=\"canonical\"";
    try_files /terms.md =404;
  }

  location = /blog.md {
    types { text/markdown md; }
    default_type text/markdown;
    add_header Cache-Control "public, max-age=3600";
    add_header Link "<https://bitterclip.com/blog>; rel=\"canonical\"";
    try_files /blog.md =404;
  }

  location ~ ^/blog/(.+)\.md$ {
    types { text/markdown md; }
    default_type text/markdown;
    add_header Cache-Control "public, max-age=3600";
    add_header Link "<https://bitterclip.com/blog/$1>; rel=\"canonical\"";
    try_files $uri =404;
  }

  location ~* \.(md|markdown)$ {
    types { text/markdown md markdown; }
    default_type text/markdown;
    add_header Cache-Control "public, max-age=3600";
    try_files $uri =404;
  }

  location = /llms.txt {
    default_type text/plain;
    add_header Cache-Control "public, max-age=3600";
    try_files /llms.txt =404;
  }

  location = /llms-full.txt {
    default_type text/plain;
    add_header Cache-Control "public, max-age=3600";
    try_files /llms-full.txt =404;
  }

  # Changelog RSS (generated from the changelog content at build time).
  location = /changelog.xml {
    default_type application/rss+xml;
    add_header Cache-Control "public, max-age=3600";
    try_files /changelog.xml =404;
  }

  location = /blog/rss.xml {
    default_type application/rss+xml;
    add_header Cache-Control "public, max-age=3600";
    try_files /blog/rss.xml =404;
  }

  # Sitemap (generated; includes all /docs/* pages).
  location = /sitemap.xml {
    default_type application/xml;
    add_header Cache-Control "public, max-age=3600";
    try_files /sitemap.xml =404;
  }

  # Docs content hub + every /docs/<section>/<page>. Prerendered to <path>/index.html;
  # the .md glob above already serves the generated /docs/**.md twins.
  location = /docs {
    try_files /docs/index.html =404;
  }

  location /docs/ {
    try_files $uri $uri/ $uri/index.html =404;
  }

  location = /blog {
    try_files /blog/index.html =404;
  }

  location /blog/ {
    try_files $uri $uri/ $uri/index.html =404;
  }

  location = /privacy {
    try_files /privacy/index.html =404;
  }

  location = /terms {
    try_files /terms/index.html =404;
  }

  # Common campaign and human-entered aliases. Keep these explicit so a
  # mistyped ad destination does not silently render the homepage.
  location = /pricing {
    return 301 /#pricing;
  }

  location = /signup {
    return 301 https://app.bitterclip.com/sign_up;
  }

  location = / {
    try_files /index.html =404;
  }

  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }

  location ~* \.(css|js|jpg|jpeg|png|svg|webp|mp4|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }
}
