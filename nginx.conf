server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /up {
    add_header Content-Type text/plain;
    try_files /up =200;
  }

  location = /index.md {
    types { text/markdown md; }
    default_type text/markdown;
    add_header Cache-Control "public, max-age=3600";
    add_header Link "<https://bitterclip.com/>; rel=\"canonical\"";
    try_files /index.md =404;
  }

  location = /docs.md {
    types { text/markdown md; }
    default_type text/markdown;
    add_header Cache-Control "public, max-age=3600";
    add_header Link "<https://bitterclip.com/docs>; rel=\"canonical\"";
    try_files /docs.md =404;
  }

  location = /mcp.md {
    types { text/markdown md; }
    default_type text/markdown;
    add_header Cache-Control "public, max-age=3600";
    add_header Link "<https://bitterclip.com/mcp>; rel=\"canonical\"";
    try_files /mcp.md =404;
  }

  location = /privacy.md {
    types { text/markdown md; }
    default_type text/markdown;
    add_header Cache-Control "public, max-age=3600";
    add_header Link "<https://bitterclip.com/privacy>; rel=\"canonical\"";
    try_files /privacy.md =404;
  }

  location ~* \.(md|markdown)$ {
    types { text/markdown md markdown; }
    default_type text/markdown;
    add_header Cache-Control "public, max-age=3600";
    try_files $uri =404;
  }

  location = /llms.txt {
    default_type text/plain;
    add_header Cache-Control "public, max-age=3600";
    try_files /llms.txt =404;
  }

  location = /llms-full.txt {
    default_type text/plain;
    add_header Cache-Control "public, max-age=3600";
    try_files /llms-full.txt =404;
  }

  location = /docs {
    try_files /docs/index.html =404;
  }

  location = /mcp {
    try_files /mcp/index.html =404;
  }

  location = /privacy {
    try_files /privacy/index.html =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(css|js|jpg|jpeg|png|svg|webp|mp4|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }
}
