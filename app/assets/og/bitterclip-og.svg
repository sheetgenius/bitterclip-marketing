<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">BitterClip</title>
  <desc id="desc">Find the moment, check the source, and export the clip.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101010"/>
      <stop offset="1" stop-color="#23201f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f28f84" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f28f84" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#ffffff" stroke-opacity="0.035"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="880" cy="285" rx="390" ry="330" fill="url(#glow)"/>

  <g font-family="Inter, Manrope, Helvetica, Arial, sans-serif">
    <g transform="translate(70 62)">
      <path d="M2 12V4a2 2 0 0 1 2-2h8M22 2h8a2 2 0 0 1 2 2v8M32 22v8a2 2 0 0 1-2 2h-8M12 32H4a2 2 0 0 1-2-2v-8" fill="none" stroke="#f28f84" stroke-width="3" stroke-linecap="round"/>
      <circle cx="17" cy="17" r="3" fill="#f28f84"/>
      <text x="48" y="25" fill="#f5f5f4" font-size="27" font-weight="700" letter-spacing="-0.5">BitterClip</text>
    </g>

    <text x="70" y="210" fill="#fafafa" font-size="66" font-weight="800" letter-spacing="-2.8">
      <tspan x="70" dy="0">Find the moment.</tspan>
      <tspan x="70" dy="76" fill="#f28f84">Check the source.</tspan>
      <tspan x="70" dy="76">Export the clip.</tspan>
    </text>

    <text x="70" y="474" fill="#b7b7b5" font-size="23" font-weight="450">
      <tspan x="70" dy="0">Transcript-first clipping in your browser, Claude,</tspan>
      <tspan x="70" dy="34">and eligible ChatGPT workspaces.</tspan>
    </text>

    <g transform="translate(70 554)">
      <rect width="328" height="42" rx="21" fill="#f28f84" fill-opacity="0.12" stroke="#f28f84" stroke-opacity="0.4"/>
      <text x="20" y="27" fill="#ffd0c7" font-size="16" font-weight="650" letter-spacing="0.2">10 hours · 150 exports · no watermark</text>
    </g>

    <g transform="translate(690 94)" filter="url(#shadow)">
      <rect width="430" height="452" rx="26" fill="#171717" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="1" y="1" width="428" height="62" rx="25" fill="#202020"/>
      <circle cx="31" cy="31" r="8" fill="#f28f84"/>
      <text x="50" y="37" fill="#e7e5e4" font-size="17" font-weight="650">Founder interview</text>
      <text x="322" y="36" fill="#858585" font-size="13">42:18</text>

      <g transform="translate(26 90)">
        <circle cx="17" cy="17" r="17" fill="#f28f84" fill-opacity="0.18"/>
        <text x="12" y="22" fill="#ffb4a8" font-size="14" font-weight="700">M</text>
        <text x="49" y="13" fill="#999999" font-size="12" font-weight="650">MICHAEL</text>
        <text x="49" y="37" fill="#d6d3d1" font-size="16">We kept thinking the product was the picker.</text>
      </g>

      <g transform="translate(26 159)">
        <circle cx="17" cy="17" r="17" fill="#52b788" fill-opacity="0.16"/>
        <text x="13" y="22" fill="#79d4aa" font-size="14" font-weight="700">J</text>
        <text x="49" y="13" fill="#999999" font-size="12" font-weight="650">JOHN</text>
        <rect x="44" y="21" width="332" height="28" rx="7" fill="#f28f84" fill-opacity="0.17"/>
        <text x="49" y="41" fill="#fff1ee" font-size="16" font-weight="600">The actual value is trust. You can check it.</text>
      </g>

      <g transform="translate(26 240)">
        <text x="0" y="13" fill="#777777" font-size="11" font-weight="650" letter-spacing="1.4">SOURCE AUDIO</text>
        <path d="M0 46h12l7-19 10 39 10-52 10 44 9-23 10 11h12l8-28 11 49 10-40 9 19h14l8-13 9 25 10-38 10 26h13l8-17 10 31 9-16h14l8-22 10 43 10-34 10 15h14l8-10 9 18 9-33 10 25h14" fill="none" stroke="#f28f84" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="0" y="79" width="378" height="4" rx="2" fill="#333333"/>
        <rect x="94" y="79" width="169" height="4" rx="2" fill="#f28f84"/>
        <circle cx="263" cy="81" r="6" fill="#ffd0c7"/>
      </g>

      <g transform="translate(26 369)">
        <rect width="145" height="48" rx="10" fill="#f28f84"/>
        <text x="31" y="30" fill="#171717" font-size="15" font-weight="750">Export clip</text>
        <text x="174" y="29" fill="#858585" font-size="13">Source stays attached</text>
      </g>
    </g>
  </g>
</svg>
